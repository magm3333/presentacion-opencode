<svg xmlns="http://www.w3.org/2000/svg" width="760" height="760" viewBox="0 0 760 760" role="img" aria-label="Ciclo de creación lúdico Plan -> Build -> Refinar">
  <defs>
    <linearGradient id="p-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1c2a55"/>
      <stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
    <filter id="p-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#59d6ff" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="760" height="760" rx="44" fill="#070a13"/>
  <circle cx="380" cy="380" r="280" fill="none" stroke="#59d6ff" stroke-width="4" stroke-dasharray="15,10" opacity="0.2"/>

  <!-- PLAN -->
  <g filter="url(#p-glow)" transform="translate(310, 80)">
    <rect width="140" height="100" rx="20" fill="url(#p-bg)" stroke="#ffd166" stroke-width="3"/>
    <text x="70" y="55" text-anchor="middle" fill="#ffe6a3" font-family="Inter,Arial" font-size="18" font-weight="900">PLAN</text>
    <text x="70" y="75" text-anchor="middle" fill="#aab7d4" font-family="Inter,Arial" font-size="12">intencion</text>
  </g>

  <!-- ANOTAR -->
  <g filter="url(#p-glow)" transform="translate(540, 260)">
    <rect width="140" height="100" rx="20" fill="url(#p-bg)" stroke="#9bffb1" stroke-width="3"/>
    <text x="70" y="55" text-anchor="middle" fill="#eef4ff" font-family="Inter,Arial" font-size="18" font-weight="900">ANOTAR</text>
    <text x="70" y="75" text-anchor="middle" fill="#aab7d4" font-family="Inter,Arial" font-size="12">humano</text>
  </g>

  <!-- BUILD -->
  <g filter="url(#p-glow)" transform="translate(430, 530)">
    <rect width="140" height="100" rx="20" fill="url(#p-bg)" stroke="#ff8fab" stroke-width="3"/>
    <text x="70" y="55" text-anchor="middle" fill="#eef4ff" font-family="Inter,Arial" font-size="18" font-weight="900">BUILD</text>
    <text x="70" y="75" text-anchor="middle" fill="#aab7d4" font-family="Inter,Arial" font-size="12">materializar</text>
  </g>

  <!-- PRODUCTO -->
  <g filter="url(#p-glow)" transform="translate(190, 530)">
    <rect width="140" height="100" rx="20" fill="url(#p-bg)" stroke="#59d6ff" stroke-width="3"/>
    <text x="70" y="55" text-anchor="middle" fill="#eef4ff" font-family="Inter,Arial" font-size="18" font-weight="900">APP</text>
    <text x="70" y="75" text-anchor="middle" fill="#aab7d4" font-family="Inter,Arial" font-size="12">validar</text>
  </g>

  <!-- REFINAR -->
  <g filter="url(#p-glow)" transform="translate(80, 260)">
    <rect width="140" height="100" rx="20" fill="url(#p-bg)" stroke="#ffd166" stroke-width="3"/>
    <text x="70" y="55" text-anchor="middle" fill="#ffe6a3" font-family="Inter,Arial" font-size="18" font-weight="900">PULIR</text>
    <text x="70" y="75" text-anchor="middle" fill="#aab7d4" font-family="Inter,Arial" font-size="12">jugar</text>
  </g>

  <path d="M455 130 Q540 130 580 260" fill="none" stroke="#59d6ff" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <path d="M610 365 Q610 450 510 530" fill="none" stroke="#59d6ff" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <path d="M430 580 H330" fill="none" stroke="#59d6ff" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <path d="M190 530 Q100 450 110 365" fill="none" stroke="#59d6ff" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <path d="M150 260 Q180 130 310 130" fill="none" stroke="#59d6ff" stroke-width="5" stroke-linecap="round" opacity="0.5"/>

  <text x="380" y="375" text-anchor="middle" fill="#9bffb1" font-family="Inter,Arial" font-size="32" font-weight="900" opacity="0.8">CREAR ES JUGAR</text>
  <text x="380" y="410" text-anchor="middle" fill="#aab7d4" font-family="Inter,Arial" font-size="18">Desarrollo Asistido Circular</text>
</svg>
