<svg xmlns="http://www.w3.org/2000/svg" width="760" height="760" viewBox="0 0 760 760" role="img" aria-label="Fase 1: Estructura y Deploy">
  <defs>
    <linearGradient id="term-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#050914"/>
      <stop offset="1" stop-color="#111a33"/>
    </linearGradient>
    <filter id="shadow-f1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="15" stdDeviation="15" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="760" height="760" rx="44" fill="#070a13"/>
  
  <g filter="url(#shadow-f1)">
    <rect x="70" y="80" width="620" height="280" rx="30" fill="url(#term-bg)" stroke="#59d6ff" stroke-opacity="0.5" stroke-width="3"/>
    <text x="110" y="160" fill="#9bffb1" font-family="monospace" font-size="20">$ npm create vite@latest . -- --template vue</text>
    <text x="110" y="210" fill="#eef4ff" font-family="monospace" font-size="18">Scaffolding project in /qrgen_demo...</text>
    <text x="110" y="260" fill="#ffd166" font-family="monospace" font-size="20">$ git push origin main</text>
    <text x="110" y="310" fill="#aab7d4" font-family="monospace" font-size="18">GitHub Actions: Deploying to gh-pages...</text>
  </g>

  <g transform="translate(180, 420)" filter="url(#shadow-f1)">
    <rect width="400" height="200" rx="34" fill="#17213f" stroke="#9bffb1" stroke-width="4"/>
    <rect x="30" y="40" width="340" height="40" rx="10" fill="#0b1020"/>
    <text x="50" y="67" fill="#59d6ff" font-family="Inter,Arial" font-size="14">magm3333.github.io/qrgen_demo/</text>
    <circle cx="200" cy="140" r="30" fill="#9bffb1" fill-opacity="0.2" stroke="#9bffb1" stroke-width="2"/>
    <path d="M190 140 l7 7 l12 -12" fill="none" stroke="#9bffb1" stroke-width="4" stroke-linecap="round"/>
    <text x="200" y="185" text-anchor="middle" fill="#eef4ff" font-family="Inter,Arial" font-size="16" font-weight="800">BASE PUBLISHED</text>
  </g>

  <text x="380" y="700" text-anchor="middle" fill="#aab7d4" font-family="Inter,Arial" font-size="18">Validación temprana del ciclo de vida</text>
</svg>
