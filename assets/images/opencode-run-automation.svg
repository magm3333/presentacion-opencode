<svg xmlns="http://www.w3.org/2000/svg" width="760" height="760" viewBox="0 0 760 760" role="img" aria-label="OpenCode run en modo no interactivo y automatizacion">
  <defs>
    <linearGradient id="terminal" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111a33"/>
      <stop offset="1" stop-color="#050914"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000" flood-opacity="0.42"/>
    </filter>
  </defs>
  <rect width="760" height="760" rx="44" fill="#070a13"/>
  <circle cx="580" cy="160" r="230" fill="#59d6ff" fill-opacity="0.1"/>
  <circle cx="180" cy="620" r="230" fill="#9bffb1" fill-opacity="0.08"/>

  <g filter="url(#shadow)">
    <rect x="72" y="112" width="616" height="344" rx="28" fill="url(#terminal)" stroke="#59d6ff" stroke-opacity="0.5" stroke-width="3"/>
    <rect x="72" y="112" width="616" height="58" rx="28" fill="#17213f"/>
    <circle cx="116" cy="141" r="9" fill="#ff6b6b"/>
    <circle cx="148" cy="141" r="9" fill="#ffd166"/>
    <circle cx="180" cy="141" r="9" fill="#9bffb1"/>
    <text x="112" y="224" fill="#9bffb1" font-family="JetBrains Mono,Consolas,monospace" font-size="26" font-weight="700">$ opencode run</text>
    <text x="112" y="272" fill="#eef4ff" font-family="JetBrains Mono,Consolas,monospace" font-size="24">"Resume el descriptor"</text>
    <path d="M112 322 H596" stroke="#aab7d4" stroke-opacity="0.22" stroke-width="2"/>
    <text x="112" y="374" fill="#59d6ff" font-family="JetBrains Mono,Consolas,monospace" font-size="23">salida breve + reproducible</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="126" y="536" width="160" height="90" rx="22" fill="#111a33" stroke="#ffd166" stroke-opacity="0.65" stroke-width="3"/>
    <text x="206" y="589" text-anchor="middle" fill="#eef4ff" font-family="Inter,Arial" font-size="22" font-weight="800">Script</text>
    <rect x="300" y="536" width="160" height="90" rx="22" fill="#111a33" stroke="#9bffb1" stroke-opacity="0.65" stroke-width="3"/>
    <text x="380" y="589" text-anchor="middle" fill="#eef4ff" font-family="Inter,Arial" font-size="22" font-weight="800">JSON</text>
    <rect x="474" y="536" width="160" height="90" rx="22" fill="#111a33" stroke="#59d6ff" stroke-opacity="0.65" stroke-width="3"/>
    <text x="554" y="589" text-anchor="middle" fill="#eef4ff" font-family="Inter,Arial" font-size="22" font-weight="800">Checklist</text>
  </g>

  <g fill="none" stroke="#59d6ff" stroke-width="6" stroke-linecap="round" stroke-opacity="0.58">
    <path d="M276 456 C260 492 236 512 210 536"/>
    <path d="M380 456 V536"/>
    <path d="M484 456 C500 492 524 512 550 536"/>
