<svg xmlns="http://www.w3.org/2000/svg" width="760" height="760" viewBox="0 0 760 760" role="img" aria-label="Estrategia de sesiones según volumen">
  <defs>
    <linearGradient id="p-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1c2a55"/>
      <stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="760" height="760" rx="44" fill="#070a13"/>
  <circle cx="580" cy="180" r="230" fill="#59d6ff" fill-opacity="0.1"/>
  
  <g filter="url(#sh)">
    <rect x="80" y="80" width="340" height="180" rx="30" fill="url(#p-bg)" stroke="#9bffb1" stroke-opacity="0.6" stroke-width="3"/>
    <text x="250" y="140" text-anchor="middle" fill="#eef4ff" font-family="Inter,Arial" font-size="22" font-weight="900">Plan Voluminoso</text>
    <text x="250" y="175" text-anchor="middle" fill="#aab7d4" font-family="Inter,Arial" font-size="15">N Sesiones (1 por hito)</text>
    <path d="M120 210 H380" stroke="#aab7d4" stroke-opacity="0.2" stroke-width="2"/>
    <text x="250" y="235" text-anchor="middle" fill="#9bffb1" font-family="Inter,Arial" font-size="14">Máximo Aislamiento</text>
  </g>

  <g filter="url(#sh)">
    <rect x="340" y="320" width="340" height="180" rx="30" fill="url(#p-bg)" stroke="#ffd166" stroke-opacity="0.6" stroke-width="3"/>
    <text x="510" y="380" text-anchor="middle" fill="#eef4ff" font-family="Inter,Arial" font-size="22" font-weight="900">Plan MVP / Rápido</text>
    <text x="510" y="415" text-anchor="middle" fill="#aab7d4" font-family="Inter,Arial" font-size="15">1 Sesión (hilo continuo)</text>
    <path d="M380 450 H640" stroke="#aab7d4" stroke-opacity="0.2" stroke-width="2"/>
    <text x="510" y="475" text-anchor="middle" fill="#ffd166" font-family="Inter,Arial" font-size="14">Agilidad Máxima</text>
  </g>

  <g transform="translate(100, 560)">
    <text x="280" y="40" text-anchor="middle" fill="#59d6ff" font-family="monospace" font-size="24">/sessions + /rename</text>
    <text x="280" y="80" text-anchor="middle" fill="#aab7d4" font-family="Inter,Arial" font-size="18">Control total del contexto según la tarea</text>
  </g>
</svg>
