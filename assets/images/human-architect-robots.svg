<svg xmlns="http://www.w3.org/2000/svg" width="760" height="760" viewBox="0 0 760 760" role="img" aria-label="El humano piensa, la herramienta construye">
  <defs>
    <filter id="gl" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#59d6ff" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="760" height="760" rx="44" fill="#070a13"/>
  
  <!-- Architect -->
  <g transform="translate(380, 200)" filter="url(#gl)">
    <circle cx="0" cy="0" r="80" fill="#1c2a55" stroke="#9bffb1" stroke-width="4"/>
    <path d="M-30 -20 Q0 -60 30 -20 L0 30 Z" fill="#eef4ff" opacity="0.8"/>
    <text x="0" y="110" text-anchor="middle" fill="#9bffb1" font-family="Inter,Arial" font-size="28" font-weight="900">ARQUITECTO (VOS)</text>
    <text x="0" y="140" text-anchor="middle" fill="#aab7d4" font-family="Inter,Arial" font-size="18">Estrategia y Pensamiento</text>
  </g>

  <!-- Robots -->
  <g transform="translate(180, 500)" opacity="0.7">
    <rect x="-40" y="-40" width="80" height="80" rx="10" fill="#111a33" stroke="#59d6ff" stroke-width="3"/>
    <circle cx="-15" cy="-10" r="5" fill="#59d6ff"/><circle cx="15" cy="-10" r="5" fill="#59d6ff"/>
    <path d="M-20 20 H20" stroke="#59d6ff" stroke-width="2"/>
    <text x="0" y="70" text-anchor="middle" fill="#59d6ff" font-family="Inter,Arial" font-size="16" font-weight="800">Robot IA</text>
  </g>

  <g transform="translate(380, 500)" opacity="0.7">
    <rect x="-40" y="-40" width="80" height="80" rx="10" fill="#111a33" stroke="#59d6ff" stroke-width="3"/>
    <circle cx="-15" cy="-10" r="5" fill="#59d6ff"/><circle cx="15" cy="-10" r="5" fill="#59d6ff"/>
    <path d="M-20 20 H20" stroke="#59d6ff" stroke-width="2"/>
    <text x="0" y="70" text-anchor="middle" fill="#59d6ff" font-family="Inter,Arial" font-size="16" font-weight="800">Robot IA</text>
  </g>

  <g transform="translate(580, 500)" opacity="0.7">
    <rect x="-40" y="-40" width="80" height="80" rx="10" fill="#111a33" stroke="#59d6ff" stroke-width="3"/>
    <circle cx="-15" cy="-10" r="5" fill="#59d6ff"/><circle cx="15" cy="-10" r="5" fill="#59d6ff"/>
    <path d="M-20 20 H20" stroke="#59d6ff" stroke-width="2"/>
    <text x="0" y="70" text-anchor="middle" fill="#59d6ff" font-family="Inter,Arial" font-size="16" font-weight="800">Robot IA</text>
  </g>

  <!-- Connections -->
  <g stroke="#9bffb1" stroke-width="4" stroke-dasharray="10,5" opacity="0.4">
    <path d="M380 280 L180 460"/>
    <path d="M380 280 V460"/>
    <path d="M380 280 L580 460"/>
  </g>
</svg>
