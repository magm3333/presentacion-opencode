<svg xmlns="http://www.w3.org/2000/svg" width="760" height="760" viewBox="0 0 760 760" role="img" aria-label="OpenCode agnóstico y extensible">
  <defs>
    <linearGradient id="c-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1c2a55"/>
      <stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
    <filter id="g" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#59d6ff" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="760" height="760" rx="44" fill="#070a13"/>
  
  <!-- Center Core -->
  <g filter="url(#g)" transform="translate(280, 280)">
    <circle cx="100" cy="100" r="100" fill="url(#c-bg)" stroke="#59d6ff" stroke-width="4"/>
    <text x="100" y="105" text-anchor="middle" fill="#eef4ff" font-family="Inter,Arial" font-size="28" font-weight="900">OpenCode</text>
  </g>

  <!-- Providers & Extensions -->
  <g font-family="Inter,Arial" font-size="20" font-weight="700">
    <!-- Top Left -->
    <rect x="50" y="100" width="180" height="80" rx="20" fill="#111a33" stroke="#9bffb1" stroke-width="2"/>
    <text x="140" y="145" text-anchor="middle" fill="#9bffb1">Anthropic</text>
    
    <!-- Top Right -->
    <rect x="530" y="100" width="180" height="80" rx="20" fill="#111a33" stroke="#ffd166" stroke-width="2"/>
    <text x="620" y="145" text-anchor="middle" fill="#ffd166">OpenAI / Google</text>
    
    <!-- Bottom Left -->
    <rect x="50" y="580" width="180" height="80" rx="20" fill="#111a33" stroke="#ff8fab" stroke-width="2"/>
    <text x="140" y="625" text-anchor="middle" fill="#ff8fab">Servidores MCP</text>
    
    <!-- Bottom Right -->
    <rect x="530" y="580" width="180" height="80" rx="20" fill="#111a33" stroke="#59d6ff" stroke-width="2"/>
    <text x="620" y="625" text-anchor="middle" fill="#59d6ff">Plugins</text>
  </g>

  <!-- Connectors -->
  <g stroke="#59d6ff" stroke-width="3" stroke-dasharray="10,10" opacity="0.4">
    <path d="M230 140 L350 300"/>
    <path d="M530 140 L410 300"/>
    <path d="M230 620 L350 460"/>
    <path d="M530 620 L410 460"/>
  </g>
  
  <text x="380" y="710" text-anchor="middle" fill="#aab7d4" font-family="Inter,Arial" font-size="22" font-weight="800">Agnóstico y Totalmente Extensible</text>
</svg>
