<svg xmlns="http://www.w3.org/2000/svg" width="760" height="760" viewBox="0 0 760 760" role="img" aria-label="Fase 3: Autenticación Estática">
  <defs>
    <linearGradient id="lock-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#24335f"/>
      <stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
    <filter id="lock-sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="760" height="760" rx="44" fill="#070a13"/>
  
  <g filter="url(#lock-sh)">
    <rect x="180" y="120" width="400" height="400" rx="34" fill="url(#lock-bg)" stroke="#ff8fab" stroke-width="3"/>
    <path d="M300 240 v-40 c0-44 36-80 80-80 s80 36 80 80 v40" fill="none" stroke="#ff8fab" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
    <rect x="250" y="240" width="260" height="180" rx="20" fill="#ff8fab" fill-opacity="0.15" stroke="#ff8fab" stroke-width="4"/>
    <circle cx="380" cy="330" r="10" fill="#eef4ff"/>
    <rect x="375" y="330" width="10" height="30" rx="5" fill="#eef4ff"/>
  </g>

  <g transform="translate(130, 560)">
    <rect width="500" height="100" rx="28" fill="#111a33" stroke="#9bffb1" stroke-opacity="0.7" stroke-width="3"/>
    <text x="250" y="42" text-anchor="middle" fill="#ffe6a3" font-family="Inter,Arial" font-size="20" font-weight="800">Auth SHA256 (sin Backend)</text>
    <text x="250" y="75" text-anchor="middle" fill="#aab7d4" font-family="Inter,Arial" font-size="16">passwords file -> crypto.subtle -> localStorage</text>
  </g>
</svg>
