<svg xmlns="http://www.w3.org/2000/svg" width="760" height="760" viewBox="0 0 760 760" role="img" aria-label="TUI de OpenCode trabajando sobre QRGen">
  <defs>
    <linearGradient id="terminal" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111a33"/>
      <stop offset="1" stop-color="#050914"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.42"/>
    </filter>
  </defs>
  <rect width="760" height="760" rx="44" fill="#070a13"/>
  <circle cx="590" cy="150" r="230" fill="#59d6ff" fill-opacity="0.1"/>
  <circle cx="170" cy="620" r="230" fill="#9bffb1" fill-opacity="0.08"/>
  <g filter="url(#shadow)">
    <rect x="70" y="96" width="620" height="390" rx="28" fill="url(#terminal)" stroke="#59d6ff" stroke-opacity="0.55" stroke-width="3"/>
    <rect x="70" y="96" width="620" height="58" rx="28" fill="#17213f"/>
    <circle cx="114" cy="125" r="9" fill="#ff6b6b"/>
    <circle cx="146" cy="125" r="9" fill="#ffd166"/>
    <circle cx="178" cy="125" r="9" fill="#9bffb1"/>
    <text x="110" y="208" fill="#9bffb1" font-family="JetBrains Mono,Consolas,monospace" font-size="25" font-weight="700">$ opencode /proyectos/qrgen</text>
    <text x="110" y="270" fill="#59d6ff" font-family="JetBrains Mono,Consolas,monospace" font-size="22">@src/App.vue</text>
    <text x="304" y="270" fill="#aab7d4" font-family="Inter,Arial" font-size="20">archivo al contexto</text>
    <text x="110" y="324" fill="#ffd166" font-family="JetBrains Mono,Consolas,monospace" font-size="22">@explore</text>
    <text x="304" y="324" fill="#aab7d4" font-family="Inter,Arial" font-size="20">subagente</text>
    <text x="110" y="378" fill="#9bffb1" font-family="JetBrains Mono,Consolas,monospace" font-size="22">!npm run build</text>
    <text x="350" y="378" fill="#aab7d4" font-family="Inter,Arial" font-size="20">shell + salida</text>
  </g>
  <g filter="url(#shadow)" font-family="Inter,Arial" text-anchor="middle">
    <rect x="165" y="560" width="430" height="92" rx="24" fill="#111a33" stroke="#9bffb1" stroke-opacity="0.65" stroke-width="3"/>
    <text x="380" y="600" fill="#eef4ff" font-size="25" font-weight="900">Contexto QRGen</text>
    <text x="380" y="632" fill="#aab7d4" font-size="18">archivos + comandos + subagentes</text>
  </g>
