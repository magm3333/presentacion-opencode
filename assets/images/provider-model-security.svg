<svg xmlns="http://www.w3.org/2000/svg" width="760" height="760" viewBox="0 0 760 760" role="img" aria-label="Proveedor, modelos y seguridad de credenciales">
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1c2a55"/>
      <stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.42"/>
    </filter>
  </defs>
  <rect width="760" height="760" rx="44" fill="#070a13"/>
  <circle cx="575" cy="130" r="210" fill="#59d6ff" fill-opacity="0.1"/>
  <circle cx="180" cy="640" r="220" fill="#9bffb1" fill-opacity="0.08"/>

  <g filter="url(#shadow)">
    <rect x="70" y="86" width="260" height="154" rx="28" fill="url(#panel)" stroke="#59d6ff" stroke-opacity="0.62" stroke-width="3"/>
    <text x="200" y="148" text-anchor="middle" fill="#eef4ff" font-family="Inter,Arial" font-size="30" font-weight="900">Proveedor</text>
    <text x="200" y="188" text-anchor="middle" fill="#aab7d4" font-family="Inter,Arial" font-size="20">auth, billing, API</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="430" y="86" width="260" height="154" rx="28" fill="url(#panel)" stroke="#9bffb1" stroke-opacity="0.62" stroke-width="3"/>
    <text x="560" y="148" text-anchor="middle" fill="#eef4ff" font-family="Inter,Arial" font-size="30" font-weight="900">Modelos</text>
    <text x="560" y="188" text-anchor="middle" fill="#aab7d4" font-family="Inter,Arial" font-size="20">capacidad + costo</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="210" y="338" width="340" height="164" rx="34" fill="url(#panel)" stroke="#ffd166" stroke-opacity="0.68" stroke-width="3"/>
    <text x="380" y="410" text-anchor="middle" fill="#ffe6a3" font-family="Inter,Arial" font-size="38" font-weight="900">OpenCode</text>
    <text x="380" y="452" text-anchor="middle" fill="#aab7d4" font-family="Inter,Arial" font-size="21">usa un modelo via proveedor</text>
  </g>

  <g fill="none" stroke="#59d6ff" stroke-width="7" stroke-linecap="round" stroke-opacity="0.72">
    <path d="M250 240 C270 292 306 320 338 338"/>
    <path d="M510 240 C490 292 454 320 422 338"/>
  </g>
  <g fill="#59d6ff" opacity="0.8">
    <path d="M338 338 l-28 -8 l18 24 z"/>
    <path d="M422 338 l28 -8 l-18 24 z"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="164" y="580" width="432" height="96" rx="26" fill="#111a33" stroke="#ff8fab" stroke-opacity="0.7" stroke-width="3"/>
    <path d="M342 633 v-28 c0-24 18-42 38-42s38 18 38 42v28" fill="none" stroke="#ff8fab" stroke-width="10" stroke-linecap="round"/>
    <rect x="326" y="622" width="108" height="62" rx="16" fill="#ff8fab" fill-opacity="0.28" stroke="#ff8fab" stroke-width="4"/>
    <circle cx="380" cy="653" r="7" fill="#eef4ff"/>
    <text x="380" y="552" text-anchor="middle" fill="#eef4ff" font-family="Inter,Arial" font-size="25" font-weight="800">Privacidad</text>
    <text x="380" y="714" text-anchor="middle" fill="#aab7d4" font-family="Inter,Arial" font-size="20">no exponer claves ni tokens</text>
  </g>
</svg>
