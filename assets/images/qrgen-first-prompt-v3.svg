<svg xmlns="http://www.w3.org/2000/svg" width="760" height="760" viewBox="0 0 760 760" role="img" aria-label="Prompt profesional y funcional para QRGen">
  <defs>
    <linearGradient id="prompt-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111a33"/>
      <stop offset="1" stop-color="#050914"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="760" height="760" rx="44" fill="#070a13"/>
  <circle cx="580" cy="180" r="230" fill="#59d6ff" fill-opacity="0.1"/>
  <circle cx="180" cy="600" r="230" fill="#9bffb1" fill-opacity="0.08"/>

  <g filter="url(#shadow)">
    <rect x="70" y="60" width="620" height="520" rx="30" fill="url(#prompt-bg)" stroke="#59d6ff" stroke-opacity="0.55" stroke-width="3"/>
    <rect x="70" y="60" width="620" height="64" rx="30" fill="#17213f"/>
    <text x="380" y="102" text-anchor="middle" fill="#eef4ff" font-family="Inter,Arial" font-size="24" font-weight="800">Prompt de Mando y Producto</text>
    
    <g transform="translate(110, 170)" font-family="JetBrains Mono,monospace" font-size="16">
      <text y="0" fill="#9bffb1" font-weight="700">Actúa como Ingeniero Senior (Vue 3)</text>
      <text y="35" fill="#aab7d4">Path: <tspan fill="#59d6ff">/ Documentos / proyectos / qrgen_demo</tspan></text>
      <text y="70" fill="#aab7d4">Repo: <tspan fill="#ffd166">magm3333 / qrgen_demo</tspan></text>
      <text y="105" fill="#aab7d4">Stack: <tspan fill="#9bffb1">Vue 3 + Vite + Pages</tspan></text>
      <text y="150" fill="#eef4ff" font-weight="700">Objetivo: Generador QR (texto -> QR)</text>
      <text y="185" fill="#eef4ff" font-weight="700">Funcionalidad: Descarga JPG/PNG</text>
      <text y="235" fill="#aab7d4">Tarea: Generá el plan de fases en <tspan fill="#9bffb1">fases-qrgen.md</tspan></text>
      <text y="280" fill="#ff8fab" font-weight="800">> No implementes código todavía</text>
    </g>

    <path d="M110 430 H610" stroke="#aab7d4" stroke-opacity="0.2" stroke-width="2"/>
    <text x="380" y="490" text-anchor="middle" fill="#9bffb1" font-family="Inter,Arial" font-size="19" font-weight="700">tecnología + dominio + planificación</text>
    <text x="380" y="525" text-anchor="middle" fill="#aab7d4" font-family="Inter,Arial" font-size="15">Sin "magia": el plan inicial ya sabe qué producto construir.</text>
  </g>

  <g filter="url(#shadow)" transform="translate(140, 610)">
    <rect width="480" height="90" rx="28" fill="#111a33" stroke="#ffd166" stroke-opacity="0.7" stroke-width="3"/>
    <text x="240" y="42" text-anchor="middle" fill="#eef4ff" font-family="Inter,Arial" font-size="21" font-weight="800">Ayuda Memoria Presentador</text>
    <text x="240" y="70" text-anchor="middle" fill="#aab7d4" font-family="Inter,Arial" font-size="16">Sincronía total entre demo y planificación</text>
  </g>
</svg>
