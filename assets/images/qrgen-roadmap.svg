<svg xmlns="http://www.w3.org/2000/svg" width="760" height="760" viewBox="0 0 760 760" role="img" aria-label="Línea de tiempo de las 5 fases de QRGen">
  <defs>
    <linearGradient id="step-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1c2a55"/>
      <stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#59d6ff" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="760" height="760" rx="44" fill="#070a13"/>
  
  <path d="M120 100 V640" stroke="#59d6ff" stroke-width="4" stroke-dasharray="8,8" stroke-opacity="0.3"/>

  <g transform="translate(120, 100)">
    <circle r="12" fill="#9bffb1" filter="url(#glow)"/>
    <rect x="40" y="-35" width="480" height="70" rx="18" fill="url(#step-bg)" stroke="#9bffb1" stroke-opacity="0.6"/>
    <text x="60" y="7" fill="#eef4ff" font-family="Inter,Arial" font-size="20" font-weight="800">Fase 1: Estructura + Auto-deploy</text>
  </g>

  <g transform="translate(120, 220)">
    <circle r="12" fill="#59d6ff" filter="url(#glow)"/>
    <rect x="40" y="-35" width="480" height="70" rx="18" fill="url(#step-bg)" stroke="#59d6ff" stroke-opacity="0.6"/>
    <text x="60" y="7" fill="#eef4ff" font-family="Inter,Arial" font-size="20" font-weight="800">Fase 2: Generación QR (MVP)</text>
  </g>

  <g transform="translate(120, 340)">
    <circle r="12" fill="#59d6ff" filter="url(#glow)"/>
    <rect x="40" y="-35" width="480" height="70" rx="18" fill="url(#step-bg)" stroke="#59d6ff" stroke-opacity="0.6"/>
    <text x="60" y="7" fill="#eef4ff" font-family="Inter,Arial" font-size="20" font-weight="800">Fase 3: Descarga JPG / PNG</text>
  </g>

  <g transform="translate(120, 460)">
    <circle r="12" fill="#ffd166" filter="url(#glow)"/>
    <rect x="40" y="-35" width="480" height="70" rx="18" fill="url(#step-bg)" stroke="#ffd166" stroke-opacity="0.6"/>
    <text x="60" y="7" fill="#eef4ff" font-family="Inter,Arial" font-size="20" font-weight="800">Fase 4: UI / UX Minimalista</text>
  </g>

  <g transform="translate(120, 580)">
    <circle r="12" fill="#ff8fab" filter="url(#glow)"/>
    <rect x="40" y="-35" width="480" height="70" rx="18" fill="url(#step-bg)" stroke="#ff8fab" stroke-opacity="0.6"/>
    <text x="60" y="7" fill="#eef4ff" font-family="Inter,Arial" font-size="20" font-weight="800">Fase 5: Despliegue Final</text>
  </g>

  <text x="380" y="700" text-anchor="middle" fill="#aab7d4" font-family="Inter,Arial" font-size="18">Estrategia de entrega incremental continua</text>
</svg>
