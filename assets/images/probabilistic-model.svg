<svg xmlns="http://www.w3.org/2000/svg" width="760" height="760" viewBox="0 0 760 760" role="img" aria-label="La herramienta no piensa, solo ejecuta probabilidades">
  <defs>
    <filter id="bl" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10"/>
    </filter>
  </defs>
  <rect width="760" height="760" rx="44" fill="#070a13"/>
  
  <g transform="translate(100, 100)">
    <path d="M0 400 Q100 100 300 200 T560 300" fill="none" stroke="#59d6ff" stroke-width="2" opacity="0.3"/>
    <path d="M0 350 Q150 50 350 250 T560 350" fill="none" stroke="#9bffb1" stroke-width="2" opacity="0.3"/>
    <path d="M0 450 Q50 200 250 400 T560 250" fill="none" stroke="#ffd166" stroke-width="2" opacity="0.3"/>
  </g>

  <g transform="translate(380, 380)">
    <rect x="-150" y="-100" width="300" height="150" rx="20" fill="#111a33" stroke="#ff8fab" stroke-width="4"/>
    <text x="0" y="-30" text-anchor="middle" fill="#eef4ff" font-family="monospace" font-size="28" font-weight="900">P(token | context)</text>
    <text x="0" y="20" text-anchor="middle" fill="#ff8fab" font-family="Inter,Arial" font-size="22" font-weight="800">Probabilidad Matemática</text>
  </g>

  <g transform="translate(380, 580)">
    <text x="0" y="0" text-anchor="middle" fill="#aab7d4" font-family="Inter,Arial" font-size="24" font-weight="900">NO PIENSA</text>
    <path d="M-80 15 H80" stroke="#ff6b6b" stroke-width="6" stroke-linecap="round"/>
    <text x="0" y="55" text-anchor="middle" fill="#ffe6a3" font-family="Inter,Arial" font-size="30" font-weight="900">SOLO EJECUTA</text>
  </g>
</svg>
