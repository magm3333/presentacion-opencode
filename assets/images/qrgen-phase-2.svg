<svg xmlns="http://www.w3.org/2000/svg" width="760" height="760" viewBox="0 0 760 760" role="img" aria-label="Fase 2: Generador QR Reactivo">
  <defs>
    <linearGradient id="qr-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1c2a55"/>
      <stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
    <filter id="qr-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#9bffb1" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="760" height="760" rx="44" fill="#070a13"/>
  <circle cx="580" cy="180" r="230" fill="#9bffb1" fill-opacity="0.08"/>

  <g filter="url(#qr-glow)">
    <rect x="100" y="100" width="560" height="400" rx="34" fill="url(#qr-bg)" stroke="#9bffb1" stroke-width="3"/>
    <text x="140" y="160" fill="#9bffb1" font-family="Inter,Arial" font-size="22" font-weight="800">QRGenerator.vue</text>
    
    <!-- Input Mock -->
    <rect x="140" y="200" width="480" height="50" rx="12" fill="#050914" stroke="#59d6ff" stroke-opacity="0.5"/>
    <text x="160" y="232" fill="#eef4ff" font-family="monospace" font-size="18">Hola OpenCode!</text>

    <!-- QR Canvas Mock -->
    <rect x="280" y="280" width="200" height="200" rx="16" fill="#f7fbff"/>
    <g fill="#0b1020">
      <rect x="300" y="300" width="40" height="40"/>
      <rect x="420" y="300" width="40" height="40"/>
      <rect x="300" y="420" width="40" height="40"/>
      <rect x="355" y="355" width="50" height="50" opacity="0.6"/>
    </g>
  </g>

  <g transform="translate(130, 560)">
    <rect width="500" height="100" rx="28" fill="#111a33" stroke="#ffd166" stroke-opacity="0.7" stroke-width="3"/>
    <text x="250" y="42" text-anchor="middle" fill="#ffe6a3" font-family="Inter,Arial" font-size="20" font-weight="800">Lógica Reactiva Core</text>
    <text x="250" y="75" text-anchor="middle" fill="#aab7d4" font-family="Inter,Arial" font-size="16">Input -> IA Generator -> Canvas Render</text>
  </g>
</svg>
