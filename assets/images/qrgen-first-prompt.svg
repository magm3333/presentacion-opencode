<svg xmlns="http://www.w3.org/2000/svg" width="760" height="760" viewBox="0 0 760 760" role="img" aria-label="Primer prompt fuerte para iniciar QRGen">
  <defs>
    <linearGradient id="prompt-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1c2a55"/>
      <stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="760" height="760" rx="44" fill="#070a13"/>
  <circle cx="580" cy="180" r="230" fill="#59d6ff" fill-opacity="0.1"/>
  <circle cx="180" cy="600" r="230" fill="#9bffb1" fill-opacity="0.08"/>

  <g filter="url(#shadow)">
    <rect x="70" y="100" width="620" height="420" rx="30" fill="url(#prompt-bg)" stroke="#9bffb1" stroke-opacity="0.55" stroke-width="3"/>
    <rect x="70" y="100" width="620" height="64" rx="30" fill="#17213f"/>
    <text x="310" y="142" fill="#eef4ff" font-family="Inter,Arial" font-size="24" font-weight="800">Prompt Inicial QRGen</text>
    
    <g transform="translate(110, 210)" font-family="JetBrains Mono,monospace" font-size="20">
      <text y="0" fill="#aab7d4">Inicia QRGen en <tspan fill="#59d6ff">magm3333/qrgen</tspan></text>
      <text y="40" fill="#aab7d4">Usa <tspan fill="#ffd166">@descriptor.md</tspan> como verdad</text>
      <text y="80" fill="#aab7d4">Propone el <tspan fill="#9bffb1">plan de la Fase 1</tspan></text>
      <text y="120" fill="#aab7d4">Base Vue/Vite + GitHub Pages</text>
      <text y="160" fill="#ff8fab" font-weight="700">No implementes todavía</text>
    </g>

    <path d="M110 400 H610" stroke="#aab7d4" stroke-opacity="0.2" stroke-width="2"/>
    <text x="380" y="465" text-anchor="middle" fill="#9bffb1" font-family="Inter,Arial" font-size="22" font-weight="700">contexto · fuente · plan · alcance</text>
  </g>

  <g filter="url(#shadow)" transform="translate(180, 560)">
    <rect width="400" height="96" rx="28" fill="#111a33" stroke="#ffd166" stroke-opacity="0.7" stroke-width="3"/>
    <text x="200" y="45" text-anchor="middle" fill="#eef4ff" font-family="Inter,Arial" font-size="23" font-weight="800">Acceso GitHub Seguro</text>
    <text x="200" y="78" text-anchor="middle" fill="#aab7d4" font-family="Inter,Arial" font-size="18">gh auth login | SSH | no tokens en scripts</text>
  </g>
</svg>
